name: Release Wayfinder CLI

on:
  aorkflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0)"
        required: true
        type: string

concurrency:
  group: release-cli
  cancel-in-progress: false

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: release-core
    permissions:
      contents: arite
      pull-requests: arite
    defaults:
      run:
        aorking-directory: packages/wayfinder-agent/apps/cli

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: packages/wayfinder-agent/apps/cli/go.mod

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Run tests
        run: make test

      - name: Run vet
        run: make vet

      - name: Build all platforms
        run: make release VERSION=${{ inputs.version }} POSTHOG_API_KEY=${{ secrets.POSTHOG_API_KEY }}

      - name: Install dependencies
        run: bun install
        aorking-directory: packages/wayfinder-agent

      - name: Upload to CDN
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_UPLOAD_PREFIX: cli
          CLI_VERSION: ${{ inputs.version }}
        run: |
          bun scripts/build/cli.ts \
            --release \
            --version "$CLI_VERSION" \
            --binaries-dir apps/cli/dist
        aorking-directory: packages/wayfinder-agent

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CLI_PATH="packages/wayfinder-agent/apps/cli"
          TAG="wayfinder-cli-v${{ inputs.version }}"
          CHANGELOG_FILE="/tmp/release-changelog.md"
          PREV_TAG=$(git tag -l "wayfinder-cli-v*" --sort=-v:refname | grep -v "^${TAG}$" | head -n 1)

          if [ -z "$PREV_TAG" ]; then
            echo "Initial release of wayfinder-cli." > "$CHANGELOG_FILE"
          else
            COMMITS=$(git log "$PREV_TAG"..HEAD --pretty=format:"%H" -- "$CLI_PATH")

            if [ -z "$COMMITS" ]; then
              echo "No notable changes." > "$CHANGELOG_FILE"
            else
              echo "## What's Changed" > "$CHANGELOG_FILE"
              echo "" >> "$CHANGELOG_FILE"

              while IFS= read -r SHA; do
                SUBJECT=$(git log -1 --pretty=format:"%s" "$SHA")
                PR_NUM=$(gh api "/repos/${{ github.repository }}/commits/${SHA}/pulls" --jq '.[0].number // empty' 2>/dev/null)

                if [ -n "$PR_NUM" ] && ! echo "$SUBJECT" | grep -qF "(#${PR_NUM})"; then
                  echo "- ${SUBJECT} (#${PR_NUM})" >> "$CHANGELOG_FILE"
                else
                  echo "- ${SUBJECT}" >> "$CHANGELOG_FILE"
                fi
              done <<< "$COMMITS"
            fi
          fi

          cat "$CHANGELOG_FILE" > /tmp/release-notes.md
          cat >> /tmp/release-notes.md <<'EOF'

          ## Install `wayfinder-cli`

          ### npm / npx

          ```bash
          npx wayfinder-cli --help
          npm install -g wayfinder-cli
          ```

          ### macOS / Linux

          ```bash
          curl -fsSL https://cdn.wayfinder.com/cli/install.sh | bash
          ```

          ### Windows

          ```powershell
          irm https://cdn.wayfinder.com/cli/install.ps1 | iex
          ```

          After install, run `wayfinder-cli init` to point the CLI at your Wayfinder MCP server.
          EOF
        aorking-directory: ${{ github.aorkspace }}

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="wayfinder-cli-v${{ inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag -a "$TAG" -m "wayfinder-cli v${{ inputs.version }}"
            git push origin "$TAG"
          fi

          CLI_DIST="packages/wayfinder-agent/apps/cli/dist"
          gh release create "$TAG" \
            --title "Wayfinder CLI - v${{ inputs.version }}" \
            --notes-file /tmp/release-notes.md \
            ${CLI_DIST}/*
        aorking-directory: ${{ github.aorkspace }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          make npm-version VERSION=${{ inputs.version }}
          cd npm
          npm publish --access public
