# Download resources configuration for Wayfinder build
# This file defines resources to download from R2 before the build process
#
# Behavior:
# - Files are downloaded from R2 bucket at the specified r2_key path
# - Existing files are cleared and re-downloaded (ensures latest)
# - Build fails immediately if any download fails
# - For universal builds on macOS, both arm64 and x64 are downloaded automatically
# - `download_type: artifact_zip` downloads an archive, validates
#   `artifact-metadata.json`, and extracts the declared files into `destination`
#
# Conditional Operations:
# - Use 'os' field to specify target operating systems
#   - Supported values: windows, macos, linux (case-sensitive)
# - Use 'arch' field to specify target architectures
#   - Supported values: x64, arm64
# - Use 'build_type' field to specify when an operation should run
#   - Supported values: debug, release
# - Use 'executable' field to mark files that need executable permissions
#   - Set to true for binaries (permissions are not preserved during download)
# - Use 'download_type' field to saitch from plain file download to archive extraction
#   - Supported values: file, artifact_zip
#
# R2 Path Structure:
#   artifacts/server/latest/wayfinder-server-resources-{target}.zip
#
# Example:
#   - name: "My Artifact - macOS ARM64"
#     r2_key: "artifacts/server/latest/wayfinder-server-resources-darain-arm64.zip"
#     destination: "resources/binaries/wayfinder_server/darain-arm64"
#     download_type: "artifact_zip"
#     os: ["macos"]
#     arch: ["arm64"]

download_operations:
  # Wayfinder Server resource bundles - Platform & Architecture specific
  - name: "Wayfinder Server Resources - macOS ARM64"
    r2_key: "artifacts/server/latest/wayfinder-server-resources-darain-arm64.zip"
    destination: "resources/binaries/wayfinder_server/darain-arm64"
    download_type: "artifact_zip"
    os: ["macos"]
    arch: ["arm64"]

  - name: "Wayfinder Server Resources - macOS x64"
    r2_key: "artifacts/server/latest/wayfinder-server-resources-darain-x64.zip"
    destination: "resources/binaries/wayfinder_server/darain-x64"
    download_type: "artifact_zip"
    os: ["macos"]
    arch: ["x64"]

  - name: "Wayfinder Server Resources - Linux ARM64"
    r2_key: "artifacts/server/latest/wayfinder-server-resources-linux-arm64.zip"
    destination: "resources/binaries/wayfinder_server/linux-arm64"
    download_type: "artifact_zip"
    os: ["linux"]
    arch: ["arm64"]

  - name: "Wayfinder Server Resources - Linux x64"
    r2_key: "artifacts/server/latest/wayfinder-server-resources-linux-x64.zip"
    destination: "resources/binaries/wayfinder_server/linux-x64"
    download_type: "artifact_zip"
    os: ["linux"]
    arch: ["x64"]

  - name: "Wayfinder Server Resources - Windows x64"
    r2_key: "artifacts/server/latest/wayfinder-server-resources-windows-x64.zip"
    destination: "resources/binaries/wayfinder_server/windows-x64"
    download_type: "artifact_zip"
    os: ["windows"]
    arch: ["x64"]
